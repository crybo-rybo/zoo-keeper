name: Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files '*.hpp' '*.cpp' '*.h' '*.c' | grep -v '^extern/')
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          clang-format-18 --dry-run --Werror "${files[@]}"

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 clang-tidy-18 libc++-18-dev libc++abi-18-dev
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV
          echo "CXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          echo "LDFLAGS=-stdlib=libc++" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DZOO_BUILD_TESTS=ON -DZOO_BUILD_EXAMPLES=ON

      - name: Run clang-tidy
        run: |
          mapfile -t files < <(git ls-files '*.cpp' | grep -v '^extern/' | grep -v '^tests/integration/')
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          clang-tidy-18 -p build --quiet \
            --header-filter='^(include/zoo|src|tests|examples)/' \
            "${files[@]}"

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cmake_extra: ""
          - os: ubuntu-latest
            compiler: clang
            cmake_extra: ""
          - os: macos-latest
            compiler: clang
            cmake_extra: "-DZOO_ENABLE_METAL=ON"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Clang (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 libc++-18-dev libc++abi-18-dev
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV
          echo "CXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          echo "LDFLAGS=-stdlib=libc++" >> $GITHUB_ENV

      - name: Build
        run: scripts/build -DZOO_BUILD_EXAMPLES=ON ${{ matrix.cmake_extra }}

      - name: Run tests
        run: scripts/test

  package-consumer-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install package dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nlohmann-json3-dev

      - name: Configure producer build
        run: cmake -B build

      - name: Build producer library
        run: cmake --build build -j$(nproc)

      - name: Smoke test build-tree package consumer
        run: |
          cmake -S tests/packaging/cmake_consumer -B build/package-buildtree \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/build"
          cmake --build build/package-buildtree -j$(nproc)

      - name: Install package to temp prefix
        run: cmake --install build --prefix "${RUNNER_TEMP}/zoo-install"

      - name: Smoke test install-tree package consumer
        run: |
          cmake -S tests/packaging/cmake_consumer -B build/package-installtree \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/zoo-install"
          cmake --build build/package-installtree -j$(nproc)

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with sanitizers
        run: scripts/build -DZOO_ENABLE_SANITIZERS=ON

      - name: Run tests under sanitizers
        run: scripts/test

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Build with coverage
        run: scripts/build -DZOO_ENABLE_COVERAGE=ON -DZOO_BUILD_INTEGRATION_TESTS=ON

      - name: Run tests
        run: scripts/test

      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/extern/*' '*/build/_deps/*' '*/tests/*' \
            --output-file coverage.info --ignore-errors unused

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

      - name: Upload to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
